<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">Soft<span>Mart</span></a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="products.html">Software</a></li>
        <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <button class="dark-toggle" id="darkToggle"><i class="fas fa-moon"></i></button>
        <a href="cart.html" class="btn btn-outline-primary cart-badge position-relative">
          <i class="fas fa-shopping-cart"></i>
          <span class="badge bg-danger rounded-pill cart-count" style="display:none"></span>
        </a>
        <a href="login.html" class="btn btn-outline-secondary btn-sm nav-login-btn">Login</a>
        <a href="register.html" class="btn btn-primary btn-sm nav-signup-btn">Sign Up</a>
        <div class="nav-user-menu d-flex align-items-center gap-2" style="display:none!important">
          <div class="dropdown">
            <button class="btn btn-outline-primary btn-sm dropdown-toggle d-flex align-items-center gap-2" data-bs-toggle="dropdown">
              <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:700" class="nav-user-avatar">U</div>
              <span class="nav-user-name">User</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="buyer-dashboard.html"><i class="fas fa-tachometer-alt me-2 text-primary"></i>My Dashboard</a></li>
              <li><a class="dropdown-item" href="cart.html"><i class="fas fa-shopping-cart me-2 text-primary"></i>My Cart</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Breadcrumb -->
<div class="breadcrumb-section">
  <div class="container">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item active">All Software</li>
      </ol>
    </nav>
  </div>
</div>

<!-- Search Bar -->
<div class="bg-white border-bottom py-3">
  <div class="container">
    <div class="row align-items-center g-3">
      <div class="col-lg-5">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
          <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Search software by name or category...">
        </div>
      </div>
      <div class="col-6 col-md-3 col-lg-2">
        <select id="catFilter" class="form-select">
          <option value="">All Categories</option>
          <option>Antivirus</option><option>Design</option><option>Developer Tools</option>
          <option>Office</option><option>AI Tools</option><option>Utility</option>
        </select>
      </div>
      <div class="col-6 col-md-3 col-lg-2">
        <select id="priceFilter" class="form-select">
          <option value="99999">Any Price</option>
          <option value="1500">Under ৳1500</option>
          <option value="3000">Under ৳3000</option>
          <option value="5000">Under ৳5000</option>
          <option value="7500">Under ৳7500</option>
        </select>
      </div>
      <div class="col-6 col-md-3 col-lg-2">
        <select id="ratingFilter" class="form-select">
          <option value="0">Any Rating</option>
          <option value="4.5">4.5+ Stars</option>
          <option value="4">4+ Stars</option>
          <option value="3">3+ Stars</option>
        </select>
      </div>
      <div class="col-6 col-md-3 col-lg-1">
        <select id="sortSelect" class="form-select">
          <option value="">Sort</option>
          <option value="price-asc">Price ↑</option>
          <option value="price-desc">Price ↓</option>
          <option value="rating">Rating</option>
          <option value="name">Name</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Products Grid -->
<section class="section-alt">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="fw-700 mb-0">All Software <span class="text-muted fw-400 fs-6 ms-2" id="resultCount"></span></h5>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-secondary"><i class="fas fa-th-large"></i></button>
        <button class="btn btn-sm btn-outline-secondary"><i class="fas fa-list"></i></button>
      </div>
    </div>
    <div class="row g-4" id="productsGrid"></div>
  </div>
</section>

<footer style="background:#0f172a;color:#94a3b8;padding:24px 0;text-align:center">
  <div class="container">© 2025 SoftMart. All rights reserved.</div>
</footer>

<div class="toast-container" id="toastContainer"></div>
